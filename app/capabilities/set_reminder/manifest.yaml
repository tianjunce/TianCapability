name: set_reminder
kind: tool
description: 创建、查询或取消单次提醒

method: POST
path: /capabilities/set_reminder
timeout_seconds: 10
supports_progress: true

input_schema:
  type: object
  additionalProperties: false
  properties:
    action:
      type: string
      enum:
        - create
        - list
        - update
        - cancel
    reminder_id:
      type: string
      minLength: 1
    content:
      type: string
      minLength: 1
    remind_at:
      type: string
      minLength: 1
    note:
      type: string
      minLength: 1
    status:
      type: string
      enum:
        - active
        - failed
        - delivered
        - cancelled
    items:
      type: array
      minItems: 1
      items:
        type: object
        additionalProperties: false
        properties:
          reminder_id:
            type: string
            minLength: 1
          content:
            type: string
            minLength: 1
          remind_at:
            type: string
            minLength: 1
          note:
            type: string
            minLength: 1
          status:
            type: string
            enum:
              - active
              - failed
              - delivered
              - cancelled

output_schema:
  type: object
  additionalProperties: false
  properties:
    action:
      type: string
      enum:
        - create
        - list
        - update
        - cancel
    reminder_id:
      type: string
    occurrence_id:
      type: string
    content:
      type: string
    note:
      anyOf:
        - type: string
        - type: "null"
    remind_at:
      type: string
    status:
      type: string
      enum:
        - active
        - failed
        - delivered
        - cancelled
    reminders:
      type: array
      items:
        type: object
    total:
      type: integer
      minimum: 0
    cancelled_occurrence_ids:
      type: array
      items:
        type: string
    batch:
      type: boolean
    item_count:
      type: integer
      minimum: 0
    success_count:
      type: integer
      minimum: 0
    failure_count:
      type: integer
      minimum: 0
    results:
      type: array
      items:
        type: object
    summary:
      type: string
  required:
    - action
    - summary
