name: manage_todo
kind: tool
description: 创建、查询、修改、完成或删除待办事项，并在存在截止时间时维护提醒计划

method: POST
path: /capabilities/manage_todo
timeout_seconds: 10
supports_progress: true

input_schema:
  type: object
  additionalProperties: false
  properties:
    action:
      type: string
      enum:
        - create
        - list
        - update
        - complete
        - delete
    todo_id:
      type: string
      minLength: 1
    title:
      type: string
      minLength: 1
    notes:
      type: string
      minLength: 1
    deadline:
      type: string
      minLength: 1
    progress_percent:
      type: integer
      minimum: 0
      maximum: 100
    difficulty:
      type: string
      minLength: 1
    status:
      type: string
      minLength: 1
    time_range:
      type: string
      minLength: 1
    slots:
      type: object
      additionalProperties: true
    constraints:
      type: object
      additionalProperties: true
    context:
      type: object
      additionalProperties: true
    items:
      type: array
      minItems: 1
      items:
        type: object
        additionalProperties: false
        properties:
          todo_id:
            type: string
            minLength: 1
          title:
            type: string
            minLength: 1
          notes:
            type: string
            minLength: 1
          deadline:
            type: string
            minLength: 1
          progress_percent:
            type: integer
            minimum: 0
            maximum: 100
          difficulty:
            type: string
            minLength: 1
          status:
            type: string
            minLength: 1
          time_range:
            type: string
            minLength: 1

output_schema:
  type: object
  additionalProperties: false
  properties:
    action:
      type: string
      enum:
        - create
        - list
        - update
        - complete
        - delete
    todo_id:
      type: string
    title:
      type: string
    notes:
      anyOf:
        - type: string
        - type: "null"
    deadline:
      anyOf:
        - type: string
        - type: "null"
    progress_percent:
      anyOf:
        - type: integer
        - type: "null"
    difficulty:
      anyOf:
        - type: string
        - type: "null"
    status:
      type: string
      enum:
        - open
        - completed
        - deleted
    occurrence_ids:
      type: array
      items:
        type: string
    reminder_plan:
      type: array
      items:
        type: object
        additionalProperties: false
        properties:
          stage:
            type: string
          label:
            type: string
          remind_at:
            type: string
        required:
          - stage
          - label
          - remind_at
    todos:
      type: array
      items:
        type: object
    total:
      type: integer
      minimum: 0
    open_total:
      type: integer
      minimum: 0
    completed_total:
      type: integer
      minimum: 0
    completed_at:
      type: string
    cancelled_occurrence_ids:
      type: array
      items:
        type: string
    batch:
      type: boolean
    item_count:
      type: integer
      minimum: 0
    success_count:
      type: integer
      minimum: 0
    failure_count:
      type: integer
      minimum: 0
    results:
      type: array
      items:
        type: object
    summary:
      type: string
  required:
    - action
    - summary
