name: capture_idea
kind: tool
description: 记录、查询或删除灵感、碎片想法

method: POST
path: /capabilities/capture_idea
timeout_seconds: 10
supports_progress: true

input_schema:
  type: object
  additionalProperties: false
  properties:
    action:
      type: string
      enum:
        - create
        - list
        - delete
    idea_id:
      type: string
      minLength: 1
    title:
      type: string
      minLength: 1
    content:
      type: string
      minLength: 1
    tags:
      type: array
      items:
        type: string
        minLength: 1
    tag:
      type: string
      minLength: 1
    status:
      type: string
      enum:
        - active
        - deleted
    items:
      type: array
      minItems: 1
      items:
        type: object
        additionalProperties: false
        properties:
          idea_id:
            type: string
            minLength: 1
          title:
            type: string
            minLength: 1
          content:
            type: string
            minLength: 1
          tags:
            type: array
            items:
              type: string
              minLength: 1
          tag:
            type: string
            minLength: 1
          status:
            type: string
            enum:
              - active
              - deleted

output_schema:
  type: object
  additionalProperties: false
  properties:
    action:
      type: string
      enum:
        - create
        - list
        - delete
    idea_id:
      type: string
    title:
      anyOf:
        - type: string
        - type: "null"
    content:
      type: string
    tags:
      type: array
      items:
        type: string
    status:
      type: string
      enum:
        - active
        - deleted
    ideas:
      type: array
      items:
        type: object
    total:
      type: integer
      minimum: 0
    batch:
      type: boolean
    item_count:
      type: integer
      minimum: 0
    success_count:
      type: integer
      minimum: 0
    failure_count:
      type: integer
      minimum: 0
    results:
      type: array
      items:
        type: object
    summary:
      type: string
  required:
    - action
    - summary
